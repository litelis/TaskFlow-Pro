<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro - AI-Powered Productivity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');
        
        * {
            font-family: 'Outfit', sans-serif;
        }
        
        :root {
            --primary: #6366f1;
            --primary-glow: #818cf8;
            --secondary: #8b5cf6;
            --accent: #22d3ee;
            --accent-glow: #67e8f9;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #050508;
            --dark-card: #0a0a12;
            --dark-border: #151520;
            --glass: rgba(12, 12, 20, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            background: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
            color: #e2e8f0;
        }
        
        /* ===================== */
        /* ADVANCED BACKGROUND   */
        /* ===================== */
        
        /* Animated gradient mesh background */
        .futuristic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 0% 0%, rgba(99, 102, 241, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 0%, rgba(139, 92, 246, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 100%, rgba(34, 211, 238, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 0% 100%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(16, 185, 129, 0.08) 0%, transparent 60%),
                linear-gradient(180deg, #050508 0%, #0a0a15 50%, #050508 100%);
            animation: meshMove 15s ease-in-out infinite;
        }
        
        @keyframes meshMove {
            0%, 100% { 
                background-position: 0% 0%, 100% 0%, 100% 100%, 0% 100%, 50% 50%, 0% 0%;
                filter: hue-rotate(0deg);
            }
            50% { 
                background-position: 20% 20%, 80% 20%, 80% 80%, 20% 80%, 50% 50%, 0% 0%;
                filter: hue-rotate(30deg);
            }
        }
        
        /* Animated grid overlay */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridPulse 4s ease-in-out infinite;
            z-index: -1;
            mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
        }
        
        @keyframes gridPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        /* Noise texture overlay */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }
        
        /* Scan lines effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
            opacity: 0.3;
        }
        
        /* ===================== */
        /* GLOW EFFECTS         */
        /* ===================== */
        
        .glow-primary {
            box-shadow: 
                0 0 20px rgba(99, 102, 241, 0.3),
                0 0 40px rgba(99, 102, 241, 0.2),
                0 0 60px rgba(99, 102, 241, 0.1);
        }
        
        .glow-accent {
            box-shadow: 
                0 0 15px rgba(34, 211, 238, 0.3),
                0 0 30px rgba(34, 211, 238, 0.2);
        }
        
        .glow-success {
            box-shadow: 
                0 0 15px rgba(16, 185, 129, 0.3),
                0 0 30px rgba(16, 185, 129, 0.2);
        }
        
        .text-glow {
            text-shadow: 
                0 0 10px currentColor,
                0 0 20px currentColor,
                0 0 40px currentColor;
        }
        
        /* ===================== */
        /* GLASS MORPHISM        */
        /* ===================== */
        
        .glass {
            background: linear-gradient(135deg, rgba(20, 20, 35, 0.8) 0%, rgba(10, 10, 18, 0.9) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .glass-card {
            background: linear-gradient(145deg, rgba(25, 25, 40, 0.85) 0%, rgba(15, 15, 25, 0.95) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 
                0 15px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .glass-card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card-hover:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(99, 102, 241, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        /* Holographic card effect */
        .holographic {
            position: relative;
            overflow: hidden;
        }
        
        .holographic::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.08),
                transparent
            );
            animation: holographicShine 3s ease-in-out infinite;
        }
        
        @keyframes holographicShine {
            0%, 100% { left: -100%; }
            50% { left: 100%; }
        }
        
        /* ===================== */
        /* CUSTOM SCROLLBAR     */
        /* ===================== */
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(99, 102, 241, 0.05);
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #6366f1, #8b5cf6);
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #818cf8, #a78bfa);
        }
        
        /* Firefox */
        .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #6366f1 rgba(99, 102, 241, 0.1);
        }
        
        /* ===================== */
        /* ANIMATIONS            */
        /* ===================== */
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(1deg); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 
                    0 0 20px rgba(99, 102, 241, 0.3),
                    0 0 40px rgba(99, 102, 241, 0.15);
            }
            50% { 
                box-shadow: 
                    0 0 30px rgba(99, 102, 241, 0.5),
                    0 0 60px rgba(99, 102, 241, 0.25);
            }
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        @keyframes rotate-glow {
            0% { transform: rotate(0deg); filter: hue-rotate(0deg); }
            100% { transform: rotate(360deg); filter: hue-rotate(360deg); }
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes fade-in-up {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
        
        @keyframes border-glow {
            0%, 100% { border-color: rgba(99, 102, 241, 0.3); }
            50% { border-color: rgba(34, 211, 238, 0.5); }
        }
        
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        
        .animate-pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }
        
        .animate-shimmer {
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.15), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        
        .animate-fade-in-up {
            animation: fade-in-up 0.5s ease-out forwards;
        }
        
        .animate-border-glow {
            animation: border-glow 2s ease-in-out infinite;
        }
        
        /* Staggered animations */
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }
        
        /* ===================== */
        /* INPUT STYLES         */
        /* ===================== */
        
        .futuristic-input {
            background: rgba(20, 20, 35, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.3s ease;
        }
        
        .futuristic-input:focus {
            border-color: #6366f1;
            box-shadow: 
                0 0 20px rgba(99, 102, 241, 0.2),
                0 0 40px rgba(99, 102, 241, 0.1),
                inset 0 0 10px rgba(99, 102, 241, 0.05);
            outline: none;
            background: rgba(20, 20, 35, 0.8);
        }
        
        .futuristic-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        /* ===================== */
        /* BUTTON STYLES        */
        /* ===================== */
        
        .futuristic-btn {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .futuristic-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: left 0.5s ease;
        }
        
        .futuristic-btn:hover::before {
            left: 100%;
        }
        
        .futuristic-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 10px 40px rgba(99, 102, 241, 0.4),
                0 0 60px rgba(99, 102, 241, 0.2);
        }
        
        .futuristic-btn:active {
            transform: translateY(0);
        }
        
        /* Accent button */
        .accent-btn {
            background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);
        }
        
        .accent-btn:hover {
            box-shadow: 
                0 10px 40px rgba(34, 211, 238, 0.4),
                0 0 60px rgba(34, 211, 238, 0.2);
        }
        
        /* Success button */
        .success-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        
        .success-btn:hover {
            box-shadow: 
                0 10px 40px rgba(16, 185, 129, 0.4),
                0 0 60px rgba(16, 185, 129, 0.2);
        }
        
        /* ===================== */
        /* BADGES & TAGS        */
        /* ===================== */
        
        .badge {
            position: relative;
            overflow: hidden;
        }
        
        .badge::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.1) 0%,
                transparent 50%
            );
        }
        
        .badge-primary {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(99, 102, 241, 0.1) 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #818cf8;
        }
        
        .badge-success {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(16, 185, 129, 0.1) 100%);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
        }
        
        .badge-warning {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(245, 158, 11, 0.1) 100%);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fbbf24;
        }
        
        .badge-accent {
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.2) 0%, rgba(34, 211, 238, 0.1) 100%);
            border: 1px solid rgba(34, 211, 238, 0.3);
            color: #67e8f9;
        }
        
        /* ===================== */
        /* TEXT GRADIENTS       */
        /* ===================== */
        
        .text-gradient {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #22d3ee);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 4s ease infinite;
        }
        
        .text-gradient-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .text-gradient-accent {
            background: linear-gradient(135deg, #22d3ee, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* ===================== */
        /* NAVIGATION           */
        /* ===================== */
        
        .nav-item {
            position: relative;
            transition: all 0.3s ease;
        }
        
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: linear-gradient(180deg, #6366f1, #22d3ee);
            border-radius: 0 2px 2px 0;
            transition: height 0.3s ease;
        }
        
        .nav-item:hover::before,
        .nav-item.active::before {
            height: 60%;
        }
        
        .nav-item.active {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.15) 0%, transparent 100%);
        }
        
        /* ===================== */
        /* PROGRESS BARS        */
        /* ===================== */
        
        .progress-bar {
            position: relative;
            overflow: hidden;
        }
        
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            animation: shimmer 2s infinite;
        }
        
        /* ===================== */
        /* MODAL EFFECTS        */
        /* ===================== */
        
        .modal-overlay {
            background: rgba(5, 5, 8, 0.85);
            backdrop-filter: blur(10px);
        }
        
        .modal-content {
            animation: modalSlideIn 0.3s ease-out;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        /* ===================== */
        /* LOADING SPINNER      */
        /* ===================== */
        
        .spinner {
            border: 2px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ===================== */
        /* ICON STYLES           */
        /* ===================== */
        
        .icon-glow {
            filter: drop-shadow(0 0 5px rgba(99, 102, 241, 0.5));
        }
        
        .icon-hover {
            transition: all 0.3s ease;
        }
        
        .icon-hover:hover {
            filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.8));
            transform: scale(1.1);
        }
        
        /* ===================== */
        /* RESPONSIVE           */
        /* ===================== */
        
        @media (max-width: 768px) {
            .glass-card:hover {
                transform: translateY(-3px) scale(1.005);
            }
        }
        
        /* ===================== */
        /* DARK MODE SPECIFIC   */
        /* ===================== */
        
        .dark .light-only { display: none; }
        .dark .dark-only { display: block; }
        
        :not(.dark) .dark-only { display: none; }
        :not(.dark) .light-only { display: block; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
</head>
<body>
    <!-- Advanced Background Layers -->
    <div class="futuristic-bg"></div>
    <div class="grid-bg"></div>
    <div class="noise-overlay"></div>
    <div class="scanlines"></div>
    
    <div id="root"></div>
    
    <script>
        // Enhanced Particle System with multiple layers
        document.addEventListener('DOMContentLoaded', () => {
            // Main canvas for particles
            const canvas = document.createElement('canvas');
            canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;mix-blend-mode: screen;';
            document.body.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            let particles = [];
            let mouseX = 0;
            let mouseY = 0;
            
            // Track mouse position
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            window.addEventListener('resize', resize);
            resize();
            
            // Create particles with variety
            const colors = [
                { r: 99, g: 102, b: 241 },  // Indigo
                { r: 139, g: 92, b: 246 },  // Purple
                { r: 34, g: 211, b: 238 },   // Cyan
                { r: 16, g: 185, b: 129 },   // Emerald
            ];
            
            for (let i = 0; i < 80; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 3 + 0.5,
                    speedX: (Math.random() - 0.5) * 0.4,
                    speedY: (Math.random() - 0.5) * 0.4,
                    opacity: Math.random() * 0.6 + 0.1,
                    color: color,
                    pulse: Math.random() * Math.PI * 2,
                    pulseSpeed: Math.random() * 0.02 + 0.01
                });
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(p => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.pulse += p.pulseSpeed;
                    
                    // Mouse interaction
                    const dx = mouseX - p.x;
                    const dy = mouseY - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        p.x -= dx * 0.01;
                        p.y -= dy * 0.01;
                    }
                    
                    // Wrap around
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;
                    
                    // Draw particle with glow
                    const currentOpacity = p.opacity * (0.7 + 0.3 * Math.sin(p.pulse));
                    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2);
                    gradient.addColorStop(0, `rgba(${p.color.r}, ${p.color.g}, ${p.color.b}, ${currentOpacity})`);
                    gradient.addColorStop(1, `rgba(${p.color.r}, ${p.color.g}, ${p.color.b}, 0)`);
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                });
                
                // Draw connections
                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                        if (dist < 120) {
                            const opacity = 0.15 * (1 - dist / 120);
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = `rgba(99, 102, 241, ${opacity})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    });
                });
                
                requestAnimationFrame(animate);
            }
            
            animate();
            
            // Add floating geometric shapes
            const shapes = ['◇', '△', '○', '☆', '◈'];
            const floatContainer = document.createElement('div');
            floatContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;';
            document.body.appendChild(floatContainer);
            
            for (let i = 0; i < 15; i++) {
                const shape = document.createElement('div');
                shape.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                shape.style.cssText = `
                    position: absolute;
                    font-size: ${Math.random() * 20 + 10}px;
                    color: rgba(99, 102, 241, ${Math.random() * 0.15 + 0.05});
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    animation: floatShape ${Math.random() * 20 + 15}s linear infinite;
                    animation-delay: -${Math.random() * 20}s;
                `;
                floatContainer.appendChild(shape);
            }
            
            // Add keyframes for shapes
            const style = document.createElement('style');
            style.textContent = `
                @keyframes floatShape {
                    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
                    10% { opacity: 1; }
                    90% { opacity: 1; }
                    100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body>
